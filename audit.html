<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🕵️ DSA 上帝视角审计日志</title>
<style>
  :root {
    --primary: #1a73e8;
    --drug: #1e8e3e;
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #e0e0e0;
    --danger: #d32f2f;
  }
  
  body { 
    font-family: -apple-system, sans-serif; 
    margin: 0; 
    padding: 8px; 
    background: var(--bg); 
    color: #333; 
    padding-bottom: 50px;
  }
  
  /* 顶部导航 */
  .top-bar { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    background: var(--card); 
    padding: 10px 12px; 
    border-radius: 8px; 
    box-shadow: 0 1px 4px rgba(0,0,0,0.05); 
    margin-bottom: 10px; 
  }
  .page-title { 
    font-size: 16px; 
    font-weight: bold; 
    margin: 0; 
    color: var(--danger);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .nav-btns {
    display: flex;
    gap: 8px;
  }
  .btn-nav { 
    background: #e8f0fe; 
    color: var(--primary); 
    border: none; 
    padding: 6px 10px; 
    border-radius: 6px; 
    font-weight: bold; 
    cursor: pointer; 
    text-decoration: none; 
    font-size: 13px;
    display: flex;
    align-items: center;
  }

  /* 核心控制台 */
  .control-panel { 
    background: var(--card); 
    border-radius: 8px; 
    padding: 12px; 
    box-shadow: 0 1px 4px rgba(0,0,0,0.05); 
    margin-bottom: 10px; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
  }

  .date-row { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    font-size: 14px; 
    font-weight: bold; 
  }
  .date-picker { 
    flex: 1; 
    border: 1px solid var(--border); 
    border-radius: 4px; 
    padding: 6px; 
    color: #111; 
    font-weight: bold; 
    font-size: 14px; 
    outline: none; 
    background: #f8f9fa; 
  }
  
  .search-row {
    display: flex;
    gap: 8px;
  }
  .search-input {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    outline: none;
  }
  .search-input:focus {
    border-color: var(--danger);
    box-shadow: 0 0 0 2px rgba(211, 47, 47, 0.1);
  }

  /* 数据表格与日志排版 */
  .table-wrapper { 
    background: var(--card); 
    border-radius: 8px; 
    box-shadow: 0 1px 4px rgba(0,0,0,0.05); 
    overflow: hidden; 
    max-height: 70vh;
    overflow-y: auto;
  }
  table { 
    width: 100%; 
    border-collapse: collapse; 
    text-align: left; 
    font-size: 14px; 
  }
  th { 
    background: #343a40; 
    color: white; 
    padding: 10px 12px; 
    font-weight: bold; 
    font-size: 13px; 
    position: sticky; 
    top: 0; 
    z-index: 10;
  }
  
  /* 审计日志专属高亮语法 */
  .log-row { border-bottom: 1px solid #eee; transition: background 0.2s; }
  .log-row:hover { background: #fffde7; }
  .log-row td { padding: 12px 10px; font-size: 14px; line-height: 1.6; color: #444; word-break: break-all; }
  
  .log-user { color: var(--primary); font-weight: bold; background: #e8f0fe; padding: 2px 6px; border-radius: 4px;}
  .log-date { font-weight: bold; color: #555; background: #f1f3f5; padding: 2px 6px; border-radius: 4px;}
  .log-item { color: #000; font-weight: 900; border-bottom: 2px solid #ffb300;}
  .log-field { font-weight: bold; color: #fff; background: #757575; padding: 2px 6px; border-radius: 4px;}
  .log-old { text-decoration: line-through; color: #9e9e9e; margin: 0 4px; font-weight: bold;}
  .log-new { color: var(--danger); font-weight: 900; font-size: 15px; margin-left: 4px; background: #ffebee; padding: 0 4px; border-radius: 2px;}
  
  .empty-state { text-align: center; padding: 40px 20px; color: #999; font-size: 14px; font-weight: bold; }
</style>
</head>
<body>

<div class="top-bar">
  <h2 class="page-title">🕵️ 系统审计日志</h2>
  <div class="nav-btns">
    <a href="index.html" class="btn-nav">◀ 填报台</a>
    <a href="dashboard.html" class="btn-nav">📊 统计看板</a>
  </div>
</div>

<div class="control-panel">
  <div class="date-row">
    从 <input type="date" id="dateStart" class="date-picker"> 
    至 <input type="date" id="dateEnd" class="date-picker">
  </div>
  <div class="search-row">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索物资名称或操作人姓名..." oninput="filterLogs()">
  </div>
</div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>追溯记录 (仅显示定稿后修改的异常数据)</th>
      </tr>
    </thead>
    <tbody id="auditBody">
      </tbody>
  </table>
</div>

<script>
// 获取今天日期
function getLocalTodayString() {
    let d = new Date(); 
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().split('T')[0];
}

const dateStart = document.getElementById('dateStart');
const dateEnd = document.getElementById('dateEnd');
const searchInput = document.getElementById('searchInput');
const auditBody = document.getElementById('auditBody');

// 【状态继承】：自动读取 dashboard 选好的时间范围，实现无缝切换
let savedStart = localStorage.getItem('hospital_dash_start');
let savedEnd = localStorage.getItem('hospital_dash_end');
dateStart.value = savedStart || getLocalTodayString();
dateEnd.value = savedEnd || getLocalTodayString();

dateStart.addEventListener('change', reloadLogs);
dateEnd.addEventListener('change', reloadLogs);

function reloadLogs() {
    if (dateEnd.value < dateStart.value) dateEnd.value = dateStart.value; 
    
    // 双向绑定，改了审计页的时间，回去看板也能继承
    localStorage.setItem('hospital_dash_start', dateStart.value);
    localStorage.setItem('hospital_dash_end', dateEnd.value);
    
    fetchAuditLogs();
}

// 纯前端搜索过滤逻辑（针对已拉取的数据）
function filterLogs() {
    const keyword = searchInput.value.toLowerCase();
    const rows = auditBody.querySelectorAll('.log-row');
    let visibleCount = 0;
    
    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        if (text.includes(keyword)) {
            row.style.display = '';
            visibleCount++;
        } else {
            row.style.display = 'none';
        }
    });
    
    // 如果搜索后没有结果，可以增加个提示，这里为了极简先略过
}

// --- 核心拉取逻辑 (预留给 PHP + SQLite) ---
function fetchAuditLogs() {
    auditBody.innerHTML = '<tr><td class="empty-state">⏳ 正在从路由器数据库检索日志...</td></tr>';
    
    /* ====================================================================
    【V29.2 联网版预留接口】
    部署到路由器后，请取消下方注释，并删除底部的 setTimeout 模拟演示代码。
    路由器上的 PHP 会接收 dateStart 和 dateEnd，查询 SQLite 的 audit_logs 表。
    ====================================================================
    
    fetch(`api/get_logs.php?start=${dateStart.value}&end=${dateEnd.value}`)
      .then(response => response.json())
      .then(data => {
          renderLogs(data);
      })
      .catch(error => {
          auditBody.innerHTML = '<tr><td class="empty-state" style="color:#d32f2f;">❌ 无法连接到路由器数据库</td></tr>';
          console.error('Error:', error);
      });
    */

    // 👇 以下为纯前端模拟演示，严格遵循你要求的文本格式
    setTimeout(() => {
        const dummyData = [
            { user: '张护士长', dateTarget: '2026-03-02', item: '法舒地尔', field: '出库', oldVal: '2', newVal: '3' },
            { user: '李医生', dateTarget: '2026-03-01', item: '造影导管', field: '期末余量', oldVal: '15', newVal: '14' },
            { user: '系统管理员', dateTarget: dateEnd.value, item: '美皮康15×20', field: '入库', oldVal: '0', newVal: '5' }
        ];
        renderLogs(dummyData);
    }, 400); // 模拟网络延迟
}

// 渲染日志 UI
function renderLogs(logsArray) {
    auditBody.innerHTML = '';
    
    if (!logsArray || logsArray.length === 0) {
        auditBody.innerHTML = '<tr><td class="empty-state">✅ 完美！所选日期内没有任何定稿后的违规修改记录。</td></tr>';
        return;
    }

    logsArray.forEach(log => {
        let tr = document.createElement('tr');
        tr.className = 'log-row';
        // 严格嵌套你要求的格式，同时加上高亮 CSS 类
        tr.innerHTML = `
            <td>
                [<span class="log-user">${log.user}</span>] 
                在 [<span class="log-date">${log.dateTarget}</span>] 
                将 [<span class="log-item">${log.item}</span>] 的 
                [<span class="log-field">${log.field}</span>] 
                由原 <span class="log-old">[${log.oldVal}]</span> 改成 <span class="log-new">[${log.newVal}]</span>
            </td>
        `;
        auditBody.appendChild(tr);
    });
    
    // 渲染完后顺便触发一下搜索框过滤，防止重新选择日期时搜索失效
    if(searchInput.value) filterLogs();
}

// 页面加载完毕初始化
window.onload = function() {
    fetchAuditLogs();
};
</script>
</body>
</html>
