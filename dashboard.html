<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📊 DSA 全科综合统计看板</title>
<style>
  :root {
    --primary: #1a73e8;
    --drug: #1e8e3e;
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #e0e0e0;
  }
  body { font-family: -apple-system, sans-serif; margin: 0; padding: 8px; background: var(--bg); color: #333; padding-bottom: 50px;}
  
  /* 顶部导航 */
  .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 10px 12px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); margin-bottom: 10px; }
  .btn-back { background: #e8f0fe; color: var(--primary); border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 14px;}
  .page-title { font-size: 16px; font-weight: bold; margin: 0; }

  /* 核心控制台 */
  .control-panel { background: var(--card); border-radius: 8px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); margin-bottom: 10px; display: flex; flex-direction: column; gap: 12px; }
  
  /* 类型切换 */
  .type-tabs { display: flex; gap: 8px; }
  .type-btn { flex: 1; padding: 8px 0; border: 1px solid var(--border); background: var(--card); border-radius: 6px; font-size: 14px; font-weight: bold; color: #555; cursor: pointer; transition: all 0.2s; }
  .type-btn[data-type="consumable"].active { background: #e8f0fe; color: var(--primary); border-color: var(--primary); }
  .type-btn[data-type="drug"].active { background: #e6f4ea; color: var(--drug); border-color: var(--drug); }

  /* 日期选择 */
  .date-row { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; }
  .date-picker { flex: 1; border: 1px solid var(--border); border-radius: 4px; padding: 6px; color: #111; font-weight: bold; font-size: 14px; outline: none; background: #f8f9fa; }

  /* 机房多选 */
  .room-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .room-label { display: flex; align-items: center; gap: 4px; background: #f1f3f5; padding: 6px 10px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; border: 1px solid transparent; transition: all 0.2s;}
  .room-label:has(input:checked) { background: #e8f0fe; color: var(--primary); border-color: #b6d4fe; }
  .room-label input { margin: 0; width: 14px; height: 14px; accent-color: var(--primary); cursor: pointer; }

  /* 数据表格 */
  .table-wrapper { background: var(--card); border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; text-align: center; font-size: 13px; }
  th { background: #343a40; color: white; padding: 10px 4px; font-weight: normal; font-size: 12px; position: sticky; top: 0; }
  .theme-drug th { background: var(--drug); }
  td { padding: 8px 4px; border-bottom: 1px solid #eee; vertical-align: middle; color: #111; font-weight: 500;}
  tbody tr:nth-child(even) { background-color: #f8fafd; }
  
  .col-name { text-align: left; padding-left: 8px; width: 28%; font-weight: bold; color: #000; }
  .col-out { color: #d32f2f; font-weight: bold; }
  .col-add { color: #1976d2; font-weight: bold; }
  .col-net { color: #d84315; font-weight: bold; font-size: 14px; background: #fff8e1; }
  .col-rem { color: #388e3c; font-weight: bold; }
  
  .empty-state { text-align: center; padding: 30px; color: #999; font-size: 14px; font-weight: bold; }
</style>
</head>
<body id="dashBody">

<div class="top-bar">
  <h2 class="page-title">📊 综合统计看板</h2>
  <a href="index.html" class="btn-back">◀ 返回填报</a>
</div>

<div class="control-panel">
  <div class="type-tabs">
    <button class="type-btn" data-type="drug" onclick="switchType('drug')">💊 药品统计</button>
    <button class="type-btn" data-type="consumable" onclick="switchType('consumable')">📦 耗材统计</button>
  </div>
  
  <div class="date-row">
    从 <input type="date" id="dateStart" class="date-picker"> 
    至 <input type="date" id="dateEnd" class="date-picker">
  </div>

  <div class="room-row">
    <label class="room-label"><input type="checkbox" id="chkAll" checked onchange="toggleAllRooms()"> 全选</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="1" checked onchange="checkRooms()"> DSA 1</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="2" checked onchange="checkRooms()"> DSA 2</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="3" checked onchange="checkRooms()"> DSA 3</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="4" checked onchange="checkRooms()"> DSA 4</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="5" checked onchange="checkRooms()"> DSA 5</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="6" checked onchange="checkRooms()"> DSA 6</label>
  </div>
</div>

<div class="table-wrapper">
  <table id="dataTable">
    <thead>
      <tr>
        <th class="col-name" id="thName">物资名称</th>
        <th>总前出</th>
        <th>总补充<br><span style="font-size:9px">(中补+后补)</span></th>
        <th>净消耗</th>
        <th>终盘余量<br><span style="font-size:9px">(所选期末)</span></th>
      </tr>
    </thead>
    <tbody id="tBody">
      </tbody>
  </table>
</div>

<script>
/**
 * 初始化：智能上下文感知
 * 从 LocalStorage 读取填报页传来的参数，做到无缝衔接
 */
let currentType = localStorage.getItem('hospital_last_type') || 'drug';

function getLocalTodayString() {
    let d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().split('T')[0];
}

// 绑定 DOM
const dateStart = document.getElementById('dateStart');
const dateEnd = document.getElementById('dateEnd');
const chkAll = document.getElementById('chkAll');
const chkRooms = document.querySelectorAll('.chk-room');
const tBody = document.getElementById('tBody');
const dashBody = document.getElementById('dashBody');

// 设置默认日期为今天
dateStart.value = getLocalTodayString();
dateEnd.value = getLocalTodayString();

// 监听条件变化，触发重新计算
dateStart.addEventListener('change', autoCorrectDateAndLoad);
dateEnd.addEventListener('change', autoCorrectDateAndLoad);

function autoCorrectDateAndLoad() {
    if (dateEnd.value < dateStart.value) dateEnd.value = dateStart.value; // 防呆设计
    loadData();
}

function switchType(type) {
    currentType = type;
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.type-btn[data-type="${type}"]`).classList.add('active');
    
    // 切换主题色
    if(type === 'drug') { dashBody.classList.add('theme-drug'); document.getElementById('thName').innerText = '药品名称'; } 
    else { dashBody.classList.remove('theme-drug'); document.getElementById('thName').innerText = '耗材名称'; }
    
    loadData();
}

// 机房多选逻辑
function toggleAllRooms() {
    let isChecked = chkAll.checked;
    chkRooms.forEach(chk => chk.checked = isChecked);
    loadData();
}

function checkRooms() {
    let allChecked = Array.from(chkRooms).every(chk => chk.checked);
    chkAll.checked = allChecked;
    loadData();
}

/**
 * 核心引擎：按日期段和机房切片聚合数据
 */
function getSelectedRooms() {
    return Array.from(chkRooms).filter(chk => chk.checked).map(chk => parseInt(chk.value));
}

function getDatesInRange(startStr, endStr) {
    let dates = [];
    let curr = new Date(startStr);
    let last = new Date(endStr);
    while(curr <= last) {
        dates.push(curr.toISOString().split('T')[0]);
        curr.setDate(curr.getDate() + 1);
    }
    return dates;
}

function loadData() {
    let rooms = getSelectedRooms();
    let dates = getDatesInRange(dateStart.value, dateEnd.value);
    
    if (rooms.length === 0) {
        tBody.innerHTML = '<tr><td colspan="5" class="empty-state">请至少选择一个手术间</td></tr>';
        return;
    }

    let itemMap = {}; // 结构: { "导管": { out: 0, add: 0, rem: 0 } }
    let hasData = false;

    // 核心双重遍历
    dates.forEach(date => {
        let isLastDay = (date === dateEnd.value); // 只有选中范围的最后一天，才计算终盘余量
        
        rooms.forEach(room => {
            let key = `hospital_v28_room_${room}_${currentType}_${date}`;
            let raw = localStorage.getItem(key);
            
            if (raw && raw !== '[]') {
                let items = JSON.parse(raw);
                items.forEach(item => {
                    let name = (item.name || "").trim();
                    if (!name) return; // 跳过空名称
                    
                    if (!itemMap[name]) itemMap[name] = { out: 0, add: 0, rem: 0 };
                    
                    let outVal = parseInt(item.out) || 0;
                    // 特殊机房计算契约：DSA6 算 addPost，其他算 addMid
                    let addVal = (room === 6) ? (parseInt(item.addPost) || 0) : (parseInt(item.addMid) || 0);
                    
                    itemMap[name].out += outVal;
                    itemMap[name].add += addVal;
                    hasData = true;

                    // 【终盘余量参考】逻辑：仅累加最后一天各被选机房的实际清点数
                    if (isLastDay) {
                        let counted = parseInt(item.rem);
                        if (!isNaN(counted)) {
                            itemMap[name].rem += counted;
                        }
                    }
                });
            }
        });
    });

    renderTable(itemMap, hasData);
}

function renderTable(itemMap, hasData) {
    tBody.innerHTML = '';
    
    if (!hasData) {
        tBody.innerHTML = '<tr><td colspan="5" class="empty-state">📦 该区间内暂无物资流转记录</td></tr>';
        return;
    }

    // 将对象转为数组并按 "净消耗 (总前出)" 降序排序
    let sortedItems = Object.entries(itemMap).sort((a, b) => b[1].out - a[1].out);

    sortedItems.forEach(([name, data]) => {
        // 如果该物资在这段时间内毫无动静，则不在报表中显示垃圾数据
        if(data.out === 0 && data.add === 0 && data.rem === 0) return; 

        // 净消耗目前逻辑上等于总前出。
        // 如果您的实际业务中，净消耗应该是 (前出 - 补充)，您可以将此处改为 `data.out - data.add`
        let netConsumption = data.out; 

        let tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="col-name">${name}</td>
            <td class="col-out">${data.out > 0 ? data.out : '-'}</td>
            <td class="col-add">${data.add > 0 ? '+' + data.add : '-'}</td>
            <td class="col-net">${netConsumption > 0 ? netConsumption : '-'}</td>
            <td class="col-rem">${data.rem}</td>
        `;
        tBody.appendChild(tr);
    });
}

// 页面加载完毕后立即执行初始化
window.onload = function() {
    switchType(currentType); // 触发UI变化和第一次数据拉取
};
</script>
</body>
</html>
