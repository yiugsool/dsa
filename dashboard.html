<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📊 DSA 全科综合统计看板</title>
<style>
  :root {
    --primary: #1a73e8;
    --drug: #1e8e3e;
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #e0e0e0;
  }
  
  body { 
    font-family: -apple-system, sans-serif; 
    margin: 0; 
    padding: 8px; 
    background: var(--bg); 
    color: #333; 
    padding-bottom: 50px;
  }
  
  /* 顶部导航：新增三页面路由切换 */
  .top-bar { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    background: var(--card); 
    padding: 10px 12px; 
    border-radius: 8px; 
    box-shadow: 0 1px 4px rgba(0,0,0,0.05); 
    margin-bottom: 10px; 
  }
  .page-title { 
    font-size: 16px; 
    font-weight: bold; 
    margin: 0; 
  }
  .nav-btns {
    display: flex;
    gap: 8px;
  }
  .btn-nav { 
    background: #e8f0fe; 
    color: var(--primary); 
    border: none; 
    padding: 6px 10px; 
    border-radius: 6px; 
    font-weight: bold; 
    cursor: pointer; 
    text-decoration: none; 
    font-size: 13px;
    display: flex;
    align-items: center;
  }
  .btn-audit {
    background: #fce4e4;
    color: #d32f2f;
  }

  /* 核心控制台 */
  .control-panel { 
    background: var(--card); 
    border-radius: 8px; 
    padding: 12px; 
    box-shadow: 0 1px 4px rgba(0,0,0,0.05); 
    margin-bottom: 10px; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
  }
  
  /* 类型切换 */
  .type-tabs { display: flex; gap: 8px; }
  .type-btn { 
    flex: 1; 
    padding: 8px 0; 
    border: 1px solid var(--border); 
    background: var(--card); 
    border-radius: 6px; 
    font-size: 14px; 
    font-weight: bold; 
    color: #555; 
    cursor: pointer; 
    transition: all 0.2s; 
  }
  .type-btn[data-type="consumable"].active { background: #e8f0fe; color: var(--primary); border-color: var(--primary); }
  .type-btn[data-type="drug"].active { background: #e6f4ea; color: var(--drug); border-color: var(--drug); }

  /* 日期选择 */
  .date-row { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    font-size: 14px; 
    font-weight: bold; 
  }
  .date-picker { 
    flex: 1; 
    border: 1px solid var(--border); 
    border-radius: 4px; 
    padding: 6px; 
    color: #111; 
    font-weight: bold; 
    font-size: 14px; 
    outline: none; 
    background: #f8f9fa; 
  }

  /* 机房多选 */
  .room-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .room-label { 
    display: flex; 
    align-items: center; 
    gap: 4px; 
    background: #f1f3f5; 
    padding: 6px 10px; 
    border-radius: 20px; 
    font-size: 13px; 
    font-weight: bold; 
    cursor: pointer; 
    border: 1px solid transparent; 
    transition: all 0.2s;
  }
  .room-label.room-0-label { background: #ffebee; color: #c62828; }
  .room-label.room-0-label:has(input:checked) { background: #c62828; color: #fff; border-color: #b71c1c; }
  
  .room-label:not(.room-0-label):has(input:checked) { background: #e8f0fe; color: var(--primary); border-color: #b6d4fe; }
  .room-label input { margin: 0; width: 14px; height: 14px; cursor: pointer; }

  /* 数据表格 */
  .table-wrapper { 
    background: var(--card); 
    border-radius: 8px; 
    box-shadow: 0 1px 4px rgba(0,0,0,0.05); 
    overflow: hidden; 
    max-height: 65vh;
    overflow-y: auto;
  }
  table { 
    width: 100%; 
    border-collapse: collapse; 
    text-align: center; 
    font-size: 14px; 
  }
  th { 
    background: var(--primary); /* 将原本的黑灰色改为主题蓝 */
    color: white; 
    padding: 10px 4px; 
    font-weight: normal; 
    font-size: 13px; 
    position: sticky; 
    top: 0; 
    z-index: 10; 
  }
  .theme-drug th { background: var(--drug); } /* 药品模式下自动变绿 */
  td { padding: 10px 4px; border-bottom: 1px solid #eee; vertical-align: middle; color: #111; font-weight: 500; }
  tbody tr:nth-child(even) { background-color: #f8fafd; }
  
  /* 1. 基础列宽对齐设定 (表头 th 和内容 td 通用) */
  .col-name { text-align: left; padding-left: 10px; width: 34%; }
  .col-add { width: 22%; }
  .col-out { width: 22%; }
  .col-rem { width: 22%; }

  /* 2. 颜色与背景样式，前面加上 td 限制，彻底防止污染 th 表头 */
  td.col-name { font-weight: bold; color: #000; }
  td.col-add { color: #1976d2; font-weight: bold; }
  td.col-out { color: #d32f2f; font-weight: bold; }
  td.col-rem { color: #000000; font-weight: 900; font-size: 15px; background-color: #e8f5e9; border-left: 2px solid #a5d6a7; }
  
  .empty-state { text-align: center; padding: 30px; color: #999; font-size: 14px; font-weight: bold; }
</style>
</head>
<body id="dashBody">
<div class="top-bar">
  <h2 class="page-title">📊 综合统计看板</h2>
  <div class="nav-btns">
    <a href="index.html" class="btn-nav">◀ 填报台</a>
    <a href="audit.html" class="btn-nav btn-audit">🕵️ 日志</a>
  </div>
</div>

<div class="control-panel">
  <div class="type-tabs">
    <button class="type-btn" data-type="drug" onclick="switchType('drug')">💊 药品统计</button>
    <button class="type-btn" data-type="consumable" onclick="switchType('consumable')">📦 耗材统计</button>
  </div>
  
  <div class="date-row">
    从 <input type="date" id="dateStart" class="date-picker"> 
    至 <input type="date" id="dateEnd" class="date-picker">
  </div>

  <div class="room-row">
    <label class="room-label"><input type="checkbox" id="chkAll" onchange="toggleAllRooms()"> 全选 1~6</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="1" onchange="checkRooms()"> DSA 1</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="2" onchange="checkRooms()"> DSA 2</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="3" onchange="checkRooms()"> DSA 3</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="4" onchange="checkRooms()"> DSA 4</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="5" onchange="checkRooms()"> DSA 5</label>
    <label class="room-label"><input type="checkbox" class="chk-room" value="6" onchange="checkRooms()"> DSA 6</label>
    <label class="room-label room-0-label"><input type="checkbox" id="chkRoom0" onchange="loadData()"> 🏥 查总库流水</label>
  </div>
</div>

<div class="table-wrapper">
  <table id="dataTable">
    <thead>
      <tr>
        <th class="col-name" id="thName">物资名称</th>
        <th class="col-add">入库</th>
        <th class="col-out">出库</th>
        <th class="col-rem">期末余量<br><span style="font-size:9px">(所选期末日)</span></th>
      </tr>
    </thead>
    <tbody id="tBody">
    </tbody>
  </table>
</div>

<script>
let currentType = localStorage.getItem('hospital_last_type') || 'drug';

function getLocalTodayString() {
    let d = new Date(); 
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().split('T')[0];
}

const dateStart = document.getElementById('dateStart');
const dateEnd = document.getElementById('dateEnd');
const chkAll = document.getElementById('chkAll');
const chkRooms = document.querySelectorAll('.chk-room');
const chkRoom0 = document.getElementById('chkRoom0');
const tBody = document.getElementById('tBody');
const dashBody = document.getElementById('dashBody');

// 【状态继承引擎】：优先读取之前保存的日期，没有再用今天
let savedStart = localStorage.getItem('hospital_dash_start');
let savedEnd = localStorage.getItem('hospital_dash_end');
dateStart.value = savedStart || getLocalTodayString();
dateEnd.value = savedEnd || getLocalTodayString();

dateStart.addEventListener('change', autoCorrectDateAndLoad);
dateEnd.addEventListener('change', autoCorrectDateAndLoad);

function autoCorrectDateAndLoad() {
    if (dateEnd.value < dateStart.value) dateEnd.value = dateStart.value; 
    
    // 跨页面状态保持，方便切换至 audit.html 时继承时间
    localStorage.setItem('hospital_dash_start', dateStart.value);
    localStorage.setItem('hospital_dash_end', dateEnd.value);
    
    loadData();
}

function switchType(type) {
    currentType = type;
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.type-btn[data-type="${type}"]`).classList.add('active');
    
    if(type === 'drug') { 
        dashBody.classList.add('theme-drug'); 
        document.getElementById('thName').innerText = '药品名称'; 
    } else { 
        dashBody.classList.remove('theme-drug'); 
        document.getElementById('thName').innerText = '耗材名称'; 
    }
    
    loadData();
}

function toggleAllRooms() {
    let isChecked = chkAll.checked;
    chkRooms.forEach(chk => chk.checked = isChecked);
    loadData();
}

function checkRooms() {
    let allChecked = Array.from(chkRooms).every(chk => chk.checked);
    chkAll.checked = allChecked;
    loadData();
}

function getSelectedRooms() {
    let rooms = Array.from(chkRooms).filter(chk => chk.checked).map(chk => parseInt(chk.value));
    if (chkRoom0.checked) rooms.push(0); 
    return rooms;
}

function getDatesInRange(startStr, endStr) {
    let dates = [];
    let curr = new Date(startStr);
    let last = new Date(endStr);
    while(curr <= last) {
        dates.push(curr.toISOString().split('T')[0]);
        curr.setDate(curr.getDate() + 1);
    }
    return dates;
}

function loadData() {
    let rooms = getSelectedRooms();
    let dates = getDatesInRange(dateStart.value, dateEnd.value);
    
    if (rooms.length === 0) {
        tBody.innerHTML = '<tr><td colspan="4" class="empty-state">请至少选择一个统计节点</td></tr>';
        return;
    }

    let itemMap = {}; 
    let hasData = false;

    dates.forEach(date => {
        let isLastDay = (date === dateEnd.value); 
        
        rooms.forEach(room => {
            let key = `hospital_v28_room_${room}_${currentType}_${date}`;
            let raw = localStorage.getItem(key);
            
            if (raw && raw !== '[]') {
                let items = JSON.parse(raw);
                items.forEach(item => {
                    let name = (item.name || "").trim();
                    if (!name) return; 
                    
                    if (!itemMap[name]) itemMap[name] = { out: 0, add: 0, rem: 0 };
                    
                    let outVal = parseInt(item.out) || 0;
                    let addVal = (room === 6) ? (parseInt(item.addPost) || 0) : (parseInt(item.addMid) || 0);
                    
                    itemMap[name].out += outVal;
                    itemMap[name].add += addVal;
                    hasData = true;

                    if (isLastDay) {
                        let counted = parseInt(item.rem);
                        if (!isNaN(counted)) {
                            itemMap[name].rem += counted;
                        }
                    }
                });
            }
        });
    });

    renderTable(itemMap, hasData);
}

function renderTable(itemMap, hasData) {
    tBody.innerHTML = '';
    
    if (!hasData) {
        tBody.innerHTML = '<tr><td colspan="4" class="empty-state">📦 该区间内暂无物资流转记录</td></tr>';
        return;
    }

    let sortedItems = Object.entries(itemMap).sort((a, b) => b[1].out - a[1].out);

    sortedItems.forEach(([name, data]) => {
        if(data.out === 0 && data.add === 0 && data.rem === 0) return; 

        let tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="col-name">${name}</td>
            <td class="col-add">${data.add > 0 ? '+' + data.add : '-'}</td>
            <td class="col-out">${data.out > 0 ? data.out : '-'}</td>
            <td class="col-rem">${data.rem}</td>
        `;
        tBody.appendChild(tr);
    });
}

window.onload = function() {
    chkAll.checked = true;
    chkRooms.forEach(chk => chk.checked = true);
    chkRoom0.checked = false;
    
    switchType(currentType); 
};
</script>
</body>
</html>
